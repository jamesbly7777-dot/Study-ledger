<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Study Tracker Pro</title>

<link rel="manifest" href="manifest.json">

<style>
  body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    display: flex;
    justify-content: center;
  }

  .app {
    max-width: 420px;
    width: 100%;
    padding: 20px;
  }

  h1 {
    text-align: center;
    font-size: 22px;
  }

  .card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border-radius: 16px;
    padding: 15px;
    margin-top: 15px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }

  button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    background: #22c55e;
    color: white;
    font-weight: bold;
    cursor: pointer;
  }

  button.stop {
    background: #ef4444;
  }

  input {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    margin-top: 10px;
  }

  .timer {
    font-size: 32px;
    text-align: center;
    margin-top: 10px;
  }

  .stat {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
  }

  canvas {
    margin-top: 10px;
    width: 100%;
  }

</style>
</head>

<body>

<div class="app">

<h1>📚 Study Tracker Pro</h1>

<div class="card">
  <div class="timer" id="timer">00:00:00</div>
  <button onclick="startTimer()">Start</button>
  <button class="stop" onclick="stopTimer()">Stop</button>
</div>

<div class="card">
  <input id="subject" placeholder="What did you study?" />
  <button onclick="saveSession()">Save Session</button>
</div>

<div class="card">
  <div class="stat">🔥 Streak: <span id="streak">0</span></div>
  <div class="stat">🎯 Daily Goal (hrs): <span id="goal">2</span></div>
  <div class="stat">⏱ Today: <span id="today">0</span></div>
</div>

<div class="card">
  <canvas id="chart"></canvas>
</div>

<div class="card">
  <button onclick="exportData()">Export Data</button>
  <input type="file" onchange="importData(event)" />
</div>

</div>

<script>
let startTime = null;
let interval;

function formatTime(ms) {
  let totalSeconds = Math.floor(ms / 1000);
  let hrs = String(Math.floor(totalSeconds / 3600)).padStart(2,'0');
  let mins = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2,'0');
  let secs = String(totalSeconds % 60).padStart(2,'0');
  return `${hrs}:${mins}:${secs}`;
}

function startTimer() {
  startTime = Date.now();
  interval = setInterval(() => {
    document.getElementById("timer").innerText =
      formatTime(Date.now() - startTime);
  }, 1000);
}

function stopTimer() {
  clearInterval(interval);
}

function saveSession() {
  let subject = document.getElementById("subject").value;
  let duration = Date.now() - startTime;

  let sessions = JSON.parse(localStorage.getItem("sessions") || "[]");

  sessions.push({
    subject,
    duration,
    date: new Date().toISOString()
  });

  localStorage.setItem("sessions", JSON.stringify(sessions));

  updateStats();
  drawChart();
}

function updateStats() {
  let sessions = JSON.parse(localStorage.getItem("sessions") || "[]");

  let today = new Date().toDateString();
  let todayTotal = 0;

  sessions.forEach(s => {
    if (new Date(s.date).toDateString() === today) {
      todayTotal += s.duration;
    }
  });

  document.getElementById("today").innerText =
    (todayTotal / 3600000).toFixed(2) + " hrs";

  // streak logic
  let streak = 0;
  let day = new Date();

  while (true) {
    let found = sessions.some(s =>
      new Date(s.date).toDateString() === day.toDateString()
    );

    if (found) {
      streak++;
      day.setDate(day.getDate() - 1);
    } else break;
  }

  document.getElementById("streak").innerText = streak;
}

function drawChart() {
  let ctx = document.getElementById("chart").getContext("2d");
  let sessions = JSON.parse(localStorage.getItem("sessions") || "[]");

  let data = {};

  sessions.forEach(s => {
    let day = new Date(s.date).toDateString();
    data[day] = (data[day] || 0) + s.duration;
  });

  let labels = Object.keys(data).slice(-7);
  let values = labels.map(d => data[d] / 3600000);

  ctx.clearRect(0,0,300,150);

  labels.forEach((label, i) => {
    ctx.fillRect(i * 40, 150 - values[i]*20, 30, values[i]*20);
  });
}

function exportData() {
  let data = localStorage.getItem("sessions");
  let blob = new Blob([data], { type: "application/json" });
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "study-data.json";
  a.click();
}

function importData(e) {
  let file = e.target.files[0];
  let reader = new FileReader();

  reader.onload = function() {
    localStorage.setItem("sessions", reader.result);
    updateStats();
    drawChart();
  };

  reader.readAsText(file);
}

updateStats();
drawChart();
</script>

</body>
</html>
