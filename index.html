<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Ledger</title>

  <style>
    body {
      font-family: Arial;
      background: #0b1220;
      color: white;
      padding: 15px;
    }

    .card {
      background: #121a2f;
      padding: 15px;
      margin-bottom: 12px;
      border-radius: 12px;
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    button {
      background: #3b82f6;
      color: white;
    }

    h2 {
      margin-bottom: 5px;
    }
  </style>
</head>

<body>

<h2>📘 Study Ledger</h2>

<div class="card">
  <input id="hours" placeholder="Hours">
  <select id="course">
    <option>Google IT</option>
    <option>Codecademy</option>
  </select>
  <button onclick="addEntry()">Add Entry</button>
</div>

<div id="entries"></div>

<div class="card">
  <h3>Totals</h3>
  <div id="google"></div>
  <div id="code"></div>
  <div id="total"></div>
  <div id="remaining"></div>
</div>

<script>
let entries = JSON.parse(localStorage.getItem("ledger")) || [];

function save() {
  localStorage.setItem("ledger", JSON.stringify(entries));
}

function addEntry() {
  let hours = parseFloat(document.getElementById("hours").value);
  let course = document.getElementById("course").value;

  if (!hours) return;

  entries.push({
    date: new Date().toLocaleDateString(),
    hours,
    course
  });

  save();
  render();
}

function render() {
  let list = document.getElementById("entries");
  list.innerHTML = "";

  let google = 0;
  let code = 0;

  entries.forEach(e => {
    list.innerHTML += `
      <div class="card">
        ${e.date} — ${e.course} → ${e.hours} hrs
      </div>
    `;

    if (e.course === "Google IT") google += e.hours;
    if (e.course === "Codecademy") code += e.hours;
  });

  let total = google + code;
  let goal = 20;
  let remaining = goal - total;

  document.getElementById("google").innerText = "Google IT: " + google.toFixed(2);
  document.getElementById("code").innerText = "Codecademy: " + code.toFixed(2);
  document.getElementById("total").innerText = "Total: " + total.toFixed(2);
  document.getElementById("remaining").innerText = "Remaining: " + remaining.toFixed(2);
}

render();
</script>

</body>
</html>
